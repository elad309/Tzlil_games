<!DOCTYPE html>
<html dir="rtl">
<head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem 1rem;gap:1.5rem;}
h1{font-size:22px;color:#D85A30;font-weight:500;}
#spinner-wrap{position:relative;width:300px;height:300px;}
#needle{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%) rotate(0deg);transform-origin:50% 100%;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:135px solid #D85A30;z-index:10;transition:transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99);}
#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:white;border:3px solid #D85A30;z-index:11;}
#progress{font-size:14px;color:#888;}
#spin-btn{padding:0.75rem 2.5rem;font-size:18px;font-weight:500;background:#D85A30;color:white;border:none;border-radius:12px;cursor:pointer;}
#spin-btn:disabled{opacity:0.4;cursor:not-allowed;}
#card{display:none;flex-direction:column;align-items:center;gap:0.5rem;}
#card img{width:320px;max-width:90vw;border-radius:12px;border:3px solid #D85A30;object-fit:cover;}
#card .pose-name{font-size:28px;color:#D85A30;font-weight:500;}
#done{display:none;text-align:center;}
#done h2{font-size:22px;color:#D85A30;}
#restart{margin-top:1rem;padding:0.6rem 2rem;font-size:15px;background:white;border:1.5px solid #D85A30;color:#D85A30;border-radius:8px;cursor:pointer;}
</style></head>

// Needle points UP. The canvas draws slice i starting at angle:
//   startRad = i*(2PI/N) - PI/2
// Slice i center (in degrees clockwise from top) = i*(360/N) + (360/N)/2
// When needle rotates by D degrees clockwise, it points at D mod 360 from top.
// So to point at slice i center: total_rotation mod 360 = sliceCenter(i)
// We add 5 full rotations for visual spin.

const N = poses.length;
const sliceDeg = 360 / N;

let remaining=[], drawn=0, spinning=false, currentAngle=0;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function initCanvas(){
  const c=document.getElementById('canvas');
  const ctx=c.getContext('2d');
  const cx=150,cy=150,r=143;
  const cols=['#EEEDFE','#E1F5EE','#EAF3DE','#FAC775','#FAECE7'];
  const strokes=['#7F77DD','#1D9E75','#3B6D11','#BA7517','#D85A30'];
  
  for(let i=0;i<N;i++){
    const startRad=i*(2*Math.PI/N)-Math.PI/2;
    const endRad=startRad+(2*Math.PI/N);
    // Draw slice
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startRad,endRad);ctx.closePath();
    ctx.fillStyle=cols[i];ctx.fill();ctx.strokeStyle=strokes[i];ctx.lineWidth=2;ctx.stroke();
    
    // Text + emoji in slice center
    const midRad=startRad+(Math.PI/N);
    const textR=r*0.62;
    const tx=cx+textR*Math.cos(midRad);
    const ty=cy+textR*Math.sin(midRad);
    
    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(midRad+Math.PI/2);
    ctx.textAlign='center';
    
    // emoji
    ctx.font='22px sans-serif';
    ctx.fillText(poses[i].emoji,-2,-10);
    
    // name
    ctx.font='bold 14px sans-serif';
    ctx.fillStyle=strokes[i];
    ctx.fillText(poses[i].name,0,12);
    
    ctx.restore();
  }
  // outer ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.strokeStyle='#D85A30';ctx.lineWidth=4;ctx.stroke();
}

function restart(){
  remaining=shuffle([...Array(N).keys()]); // shuffle indices
  drawn=0;currentAngle=0;
  const needle=document.getElementById('needle');
  needle.style.transition='none';
  needle.style.transform='translate(-50%,-100%) rotate(0deg)';
  document.getElementById('card').style.display='none';
  document.getElementById('done').style.display='none';
  document.getElementById('spin-btn').style.display='block';
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('progress').textContent='קלף 0 מתוך 5';
}

function spin(){
  if(spinning||remaining.length===0)return;
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('card').style.display='none';
  
  // Pick next pose index from shuffled remaining
  const poseIdx=remaining.shift();
  
  // Slice i center in degrees clockwise from top = i*sliceDeg + sliceDeg/2
  const sliceCenter=poseIdx*sliceDeg+sliceDeg/2;
  
  // Current angle mod 360
  const cur=((currentAngle%360)+360)%360;
  
  // How many extra degrees to rotate so we land exactly on sliceCenter
  let delta=sliceCenter-cur;
  if(delta<0) delta+=360;
  
  // Add 5 full spins for effect
  const newAngle=currentAngle+5*360+delta;
  
  const needle=document.getElementById('needle');
  needle.style.transition='transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99)';
  needle.style.transform='translate(-50%,-100%) rotate('+newAngle+'deg)';
  currentAngle=newAngle;
  
  setTimeout(()=>{
    drawn++;
    document.getElementById('progress').textContent='קלף '+drawn+' מתוך 5';
    const pose=poses[poseIdx];
    document.getElementById('card-img').src=pose.src;
    document.getElementById('card-name').textContent=pose.emoji+' '+pose.name;
    document.getElementById('card').style.display='flex';
    spinning=false;
    if(remaining.length===0){
      document.getElementById('spin-btn').style.display='none';
      setTimeout(()=>{document.getElementById('done').style.display='block';},800);
    } else {
      document.getElementById('spin-btn').disabled=false;
    }
  },3600);
}

initCanvas();restart();

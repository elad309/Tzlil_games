<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>עשר המכות – משחק זיכרון</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6B35;
  --yellow:#FFD93D;
  --teal:#4ECDC4;
  --purple:#A855F7;
  --pink:#F472B6;
  --green:#22C55E;
  --bg1:#FF6B35;
  --bg2:#FFD93D;
  --bg3:#4ECDC4;
  --dark:#1a1a2e;
}
body{
  font-family:'Heebo',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== SCREEN SYSTEM ===== */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ===== WELCOME SCREEN ===== */
#screen-welcome{
  background:linear-gradient(135deg,#FF6B35 0%,#FFD93D 35%,#4ECDC4 70%,#A855F7 100%);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:2rem 1rem;
}
#screen-welcome::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.15) 0%,transparent 50%),
             radial-gradient(circle at 80% 80%,rgba(255,255,255,.1) 0%,transparent 50%);
}
.welcome-bubbles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.bubble{
  position:absolute;
  border-radius:50%;
  opacity:.15;
  animation:float 6s ease-in-out infinite;
}
.b1{width:120px;height:120px;background:#fff;top:5%;left:5%;animation-delay:0s}
.b2{width:80px;height:80px;background:#fff;top:15%;right:8%;animation-delay:1s}
.b3{width:200px;height:200px;background:#fff;bottom:10%;left:-3%;animation-delay:2s}
.b4{width:60px;height:60px;background:#fff;bottom:25%;right:5%;animation-delay:0.5s}
.b5{width:150px;height:150px;background:#fff;top:40%;right:-5%;animation-delay:1.5s}

@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(5deg)}}

.welcome-content{position:relative;z-index:1;text-align:center}
.welcome-emoji{font-size:5rem;display:block;margin-bottom:1rem;animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.welcome-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2rem,8vw,4rem);
  color:#fff;
  text-shadow:3px 3px 0 rgba(0,0,0,.2),6px 6px 0 rgba(0,0,0,.1);
  line-height:1.1;
  margin-bottom:.5rem;
}
.welcome-subtitle{
  font-size:1.2rem;
  color:rgba(255,255,255,.9);
  font-weight:700;
  margin-bottom:2.5rem;
  text-shadow:1px 1px 0 rgba(0,0,0,.2);
}
.levels-title{
  font-size:1.1rem;
  color:rgba(255,255,255,.9);
  font-weight:700;
  margin-bottom:1.2rem;
  text-transform:uppercase;
  letter-spacing:.15em;
}
.levels-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
  max-width:440px;
  width:100%;
}
.level-card{
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,.4);
  border-radius:20px;
  padding:1.5rem 1rem;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.level-card::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .2s;
}
.level-card:hover{
  transform:translateY(-6px) scale(1.04);
  border-color:#fff;
  background:rgba(255,255,255,.35);
  box-shadow:0 12px 40px rgba(0,0,0,.2);
}
.level-card:hover::after{background:rgba(255,255,255,.05)}
.level-emoji{font-size:2.5rem;display:block;margin-bottom:.5rem}
.level-name{font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:.25rem}
.level-desc{font-size:.85rem;opacity:.85;font-weight:600}
.level-pairs{
  display:inline-block;
  background:rgba(255,255,255,.25);
  border-radius:20px;
  padding:.15rem .7rem;
  font-size:.8rem;
  font-weight:900;
  margin-top:.5rem;
}

/* ===== GAME SCREEN ===== */
#screen-game{
  flex-direction:column;
  min-height:100vh;
  position:relative;
}
.game-bg{
  position:fixed;inset:0;z-index:0;
  transition:background .8s;
}
.game-content{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;padding:.8rem .5rem 1.2rem}

/* Header */
.game-header{
  width:100%;max-width:620px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.8rem;
  gap:.5rem;
}
.back-btn{
  background:rgba(255,255,255,.25);
  border:2px solid rgba(255,255,255,.4);
  border-radius:12px;
  padding:.5rem 1rem;
  color:#fff;
  font-family:'Heebo',sans-serif;
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.back-btn:hover{background:rgba(255,255,255,.4)}
.game-title-bar{
  font-family:'Fredoka One',cursive;
  color:#fff;
  font-size:1.3rem;
  text-shadow:1px 2px 0 rgba(0,0,0,.2);
  flex:1;text-align:center;
}
.new-btn{
  background:rgba(255,255,255,.25);
  border:2px solid rgba(255,255,255,.4);
  border-radius:12px;
  padding:.5rem 1rem;
  color:#fff;
  font-family:'Heebo',sans-serif;
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.new-btn:hover{background:rgba(255,255,255,.4)}

/* Stats */
.stats-bar{
  display:flex;gap:.8rem;margin-bottom:.8rem;
}
.stat-pill{
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.4);
  border-radius:50px;
  padding:.4rem 1rem;
  text-align:center;
  color:#fff;
  min-width:80px;
}
.stat-pill .sv{font-family:'Fredoka One',cursive;font-size:1.4rem;line-height:1}
.stat-pill .sl{font-size:.7rem;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.05em}

/* Win message */
.win-banner{
  background:rgba(255,255,255,.3);
  backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,.5);
  border-radius:20px;
  padding:.7rem 1.5rem;
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:1.2rem;
  text-align:center;
  margin-bottom:.8rem;
  min-height:2.8rem;
  display:flex;align-items:center;justify-content:center;
  width:100%;max-width:620px;
  animation:none;
}
.win-banner.show{animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

/* Grid */
.game-grid{display:grid;gap:8px;width:100%;max-width:620px}

/* Cards */
.card{aspect-ratio:1;cursor:pointer;perspective:700px}
.ci{
  width:100%;height:100%;
  position:relative;transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
}
.card.fl .ci,.card.mt .ci{transform:rotateY(180deg)}
.cf,.cb{
  position:absolute;width:100%;height:100%;
  backface-visibility:hidden;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;overflow:hidden;
}
.cb{
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.45);
  transition:all .2s;
}
.card:hover:not(.fl):not(.mt) .cb{
  background:rgba(255,255,255,.38);
  border-color:rgba(255,255,255,.7);
  transform:scale(1.03);
}
.cb-smiley{font-family:'Fredoka One',cursive;font-size:2.2rem;color:rgba(255,255,255,.9);text-shadow:0 2px 6px rgba(0,0,0,.2)}
.cf{
  background:rgba(255,255,255,.92);
  border:2px solid rgba(255,255,255,.8);
  transform:rotateY(180deg);
  box-shadow:0 4px 15px rgba(0,0,0,.1);
}
.cf img{width:100%;height:72%;object-fit:contain;padding:4px}
.cf-lbl{
  font-size:10px;
  color:#444;
  padding:2px 4px 4px;
  text-align:center;
  font-weight:700;
  line-height:1.2;
  direction:rtl;
  width:100%;
}
.card.mt .cf{
  border-color:#22C55E;
  background:#f0fdf4;
  animation:matched .4s cubic-bezier(.34,1.56,.64,1);
}
.card.mt .cf-lbl{color:#15803d}
@keyframes matched{0%{transform:rotateY(180deg) scale(.9)}100%{transform:rotateY(180deg) scale(1)}}

/* Win overlay */
#win-overlay{
  display:none;
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.55);
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#win-overlay.show{display:flex}
.win-box{
  background:linear-gradient(135deg,#FF6B35,#FFD93D,#4ECDC4);
  border-radius:28px;
  padding:2.5rem 2rem;
  text-align:center;
  color:#fff;
  max-width:340px;width:90%;
  animation:slideUp .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  position:relative;
  overflow:hidden;
}
.win-box::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.2),transparent 60%);
}
.win-box-content{position:relative;z-index:1}
@keyframes slideUp{0%{transform:translateY(60px);opacity:0}100%{transform:translateY(0);opacity:1}}
.win-emoji{font-size:4rem;display:block;animation:spin 1s ease-in-out}
@keyframes spin{0%{transform:rotate(-20deg) scale(.5)}60%{transform:rotate(10deg) scale(1.1)}100%{transform:rotate(0) scale(1)}}
.win-title{font-family:'Fredoka One',cursive;font-size:2rem;margin:.5rem 0}
.win-sub{font-size:1rem;opacity:.9;font-weight:600;margin-bottom:1.5rem}
.win-play-again{
  background:rgba(255,255,255,.3);
  border:2px solid rgba(255,255,255,.6);
  border-radius:50px;
  padding:.8rem 2rem;
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:1.2rem;
  cursor:pointer;
  transition:all .2s;
  margin:.3rem .3rem 0;
  display:inline-block;
}
.win-play-again:hover{background:rgba(255,255,255,.45);transform:scale(1.05)}
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-bubbles">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
  </div>
  <div class="welcome-content">
    <h1 class="welcome-title">עשר המכות</h1>
    <p class="welcome-subtitle">משחק זיכרון</p>
    <p class="levels-title">בחר רמת קושי</p>
    <div class="levels-grid">
      <div class="level-card" onclick="startGame(3)">
        <span class="level-emoji">😊</span>
        <div class="level-name">קל</div>
        <div class="level-pairs">3 זוגות</div>
      </div>
      <div class="level-card" onclick="startGame(5)">
        <span class="level-emoji">😄</span>
        <div class="level-name">בינוני</div>
        <div class="level-pairs">5 זוגות</div>
      </div>
      <div class="level-card" onclick="startGame(8)">
        <span class="level-emoji">🤔</span>
        <div class="level-name">קשה</div>
        <div class="level-pairs">8 זוגות</div>
      </div>
      <div class="level-card" onclick="startGame(10)">
        <span class="level-emoji">🏆</span>
        <div class="level-name">מאסטר</div>
        <div class="level-pairs">10 זוגות</div>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="game-bg" id="gameBg"></div>
  <div class="game-content">
    <div class="game-header">
      <button class="back-btn" onclick="goBack()">← חזרה</button>
      <div class="game-title-bar" id="gameTitle">משחק זיכרון</div>
      <button class="new-btn" onclick="restartGame()">🔄 חדש</button>
    </div>
    <div class="stats-bar">
      <div class="stat-pill"><div class="sv" id="sv-mv">0</div><div class="sl">מהלכים</div></div>
      <div class="stat-pill"><div class="sv" id="sv-mt">0</div><div class="sl">זוגות</div></div>
      <div class="stat-pill"><div class="sv" id="sv-rem">0</div><div class="sl">נשארו</div></div>
    </div>
    <div class="win-banner" id="winBanner"></div>
    <div class="game-grid" id="grid"></div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-box">
    <div class="win-box-content">
      <span class="win-emoji">🎉</span>
      <div class="win-title">כל הכבוד!</div>
      <div class="win-sub" id="win-sub-text">סיימת ב-0 מהלכים!</div>
      <button class="win-play-again" onclick="restartGame();closeWin()">🔄 שוב!</button>
      <button class="win-play-again" onclick="goBack();closeWin()">🏠 בית</button>
    </div>
  </div>
</div>

<script>

];

let curLevel=3, fl=[], matched=0, mv=0, lk=false, curBg=0;

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function cols(pairs){
  if(pairs<=6) return 3;
  if(pairs<=10) return 4;
  return 5;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(n){
  curLevel=n;
  curBg=Math.floor(Math.random()*BG_GRADIENTS.length);
  document.getElementById('gameBg').style.background=BG_GRADIENTS[curBg];
  document.getElementById('gameTitle').textContent=LEVEL_NAMES[n]+' – '+n+' זוגות';
  showScreen('screen-game');
  init();
}

function goBack(){
  showScreen('screen-welcome');
}

function closeWin(){
  document.getElementById('win-overlay').classList.remove('show');
}

function restartGame(){
  curBg=(curBg+1)%BG_GRADIENTS.length;
  document.getElementById('gameBg').style.background=BG_GRADIENTS[curBg];
  init();
}

function init(){
  fl=[];matched=0;mv=0;lk=false;
  document.getElementById('sv-mv').textContent='0';
  document.getElementById('sv-mt').textContent='0';
  document.getElementById('sv-rem').textContent=curLevel;
  const wb=document.getElementById('winBanner');
  wb.textContent='';wb.classList.remove('show');

  const subset=sh([...PLAGUES]).slice(0,curLevel);
  const pairs=sh([...subset,...subset]);
  const g=document.getElementById('grid');
  const c=cols(curLevel*2);
  g.style.gridTemplateColumns=`repeat(${c},1fr)`;
  g.innerHTML='';

  pairs.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.pid=p.id;
    card.innerHTML=`<div class="ci">
      <div class="cb"><div class="cb-smiley">${i+1}</div></div>
      <div class="cf"><img src="${p.src}" alt="${p.label}"/><div class="cf-lbl">${p.label}</div></div>
    </div>`;
    card.addEventListener('click',()=>flip(card));
    g.appendChild(card);
  });
}

function flip(c){
  if(lk||c.classList.contains('fl')||c.classList.contains('mt'))return;
  c.classList.add('fl');fl.push(c);
  if(fl.length===2){
    lk=true;mv++;
    document.getElementById('sv-mv').textContent=mv;
    const[a,b]=fl;
    if(a.dataset.pid===b.dataset.pid){
      a.classList.add('mt');b.classList.add('mt');
      a.classList.remove('fl');b.classList.remove('fl');
      matched++;
      document.getElementById('sv-mt').textContent=matched;
      document.getElementById('sv-rem').textContent=curLevel-matched;
      fl=[];lk=false;
      if(matched===curLevel){
        setTimeout(()=>{
          document.getElementById('win-sub-text').textContent='סיימת ב-'+mv+' מהלכים! 🎊';
          document.getElementById('win-overlay').classList.add('show');
        },500);
      }
    }else{
      setTimeout(()=>{a.classList.remove('fl');b.classList.remove('fl');fl=[];lk=false;},950);
    }
  }
}
</script>

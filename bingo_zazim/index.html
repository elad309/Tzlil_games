<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>בינגו זזים!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
    background: linear-gradient(160deg, #1a73e8 0%, #6a11cb 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 14px 10px;
    user-select: none;
    -webkit-user-select: none;
  }

  header {
    text-align: center;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 2.2em;
    color: #fff;
    text-shadow: 0 3px 12px rgba(0,0,0,0.3);
    letter-spacing: 2px;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.95em;
    margin-top: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 920px;
  }

  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    box-shadow: 0 5px 18px rgba(0,0,0,0.22);
    transition: transform 0.15s ease;
    border: 4px solid transparent;
    -webkit-tap-highlight-color: transparent;
    aspect-ratio: 3/4;
  }

  .card:active { transform: scale(0.95); }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .card .overlay {
    position: absolute;
    inset: 0;
    background: transparent;
    border-radius: 12px;
    transition: background 0.25s;
  }

  /* MARKED state */
  .card.marked {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px #22c55e, 0 8px 24px rgba(0,0,0,0.25);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .card.marked .overlay {
    background: rgba(34,197,94,0.22);
  }

  .card.marked::after {
    content: '✓';
    position: absolute;
    top: 7px;
    left: 8px;
    width: 34px;
    height: 34px;
    background: #22c55e;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    font-weight: bold;
    line-height: 34px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    animation: checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    0% { transform: scale(0.93); }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes checkPop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.25); }
    100% { transform: scale(1); opacity: 1; }
  }

  .btn-row {
    margin-top: 12px;
    display: flex;
    gap: 12px;
  }

  .btn {
    padding: 13px 26px;
    border: none;
    border-radius: 50px;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.94); }
  .btn-new { background: #FFD700; color: #333; }
  .btn-reset { background: rgba(255,255,255,0.22); color: white; }

  /* WIN OVERLAY */
  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 200;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  .win-overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .win-box {
    background: white;
    border-radius: 28px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: winPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes winPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .win-emoji { font-size: 4em; }
  .win-text { font-size: 3em; font-weight: bold; color: #22c55e; margin: 8px 0; }
  .win-sub { font-size: 1.2em; color: #555; margin-bottom: 22px; }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <h1>🏃 בינגו זזים! 🤸</h1>
  <div class="subtitle">סמן כל תנועה שאתה רואה!</div>
</header>

<div class="grid" id="grid"></div>

<div class="btn-row">
  <button class="btn btn-new" onclick="newCard()">🔀 כרטיס חדש</button>
  <button class="btn btn-reset" onclick="resetCard()">↺ נקה סימונים</button>
</div>

<div class="win-overlay" id="winOverlay" onclick="closeWin()">
  <div class="win-box" onclick="event.stopPropagation()">
    <div class="win-emoji">🎉</div>
    <div class="win-text">בינגו!!!</div>
    <div class="win-sub">כל הכבוד! סימנת הכל! 🌟</div>
    <button class="btn btn-new" onclick="newCard(); closeWin()">🔀 כרטיס חדש</button>
  </div>
</div>

let currentCards = [];
let marked = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newCard() {
  currentCards = shuffle(ALL_CARDS).slice(0, 8);
  marked = {};
  renderGrid();
}

function resetCard() {
  marked = {};
  renderGrid();
}

function toggleMark(id) {
  if (marked[id]) delete marked[id];
  else marked[id] = true;
  renderGrid();
  if (Object.keys(marked).length === currentCards.length) {
    setTimeout(showWin, 350);
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  currentCards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card' + (marked[card.id] ? ' marked' : '');
    div.onclick = () => toggleMark(card.id);

    const img = document.createElement('img');
    img.src = card.img;
    img.alt = card.label;
    img.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'overlay';

    div.appendChild(img);
    div.appendChild(overlay);
    grid.appendChild(div);
  });
}

function showWin() {
  document.getElementById('winOverlay').classList.add('show');
  launchConfetti();
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
}

function launchConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#FF8B94','#B8B5FF','#FFC9A5','#22c55e','#3b82f6'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    p.style.animationDelay = (Math.random() * 1.8) + 's';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
    const size = (8 + Math.random() * 10) + 'px';
    p.style.width = size;
    p.style.height = size;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
}

newCard();
